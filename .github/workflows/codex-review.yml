name: "Codex QA Review"

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          DIFF=$(git diff HEAD~1 HEAD 2>/dev/null | head -300 || echo "Initial commit")
          echo "$DIFF" > /tmp/diff.txt
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | tr '\n' ', ' || echo "all")
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run QA Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/diff.txt | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" | sed 's/^"//;s/"$//')

          cat > /tmp/request.json << REQEOF
          {
            "model": "gpt-4o",
            "messages": [
              {"role": "system", "content": "You are a QA engineer for the Inside project. Review code changes. Be concise."},
              {"role": "user", "content": "Changed files: ${{ steps.diff.outputs.files }}\n\nDiff:\n${DIFF_CONTENT}\n\nProvide review as:\n## QA Review\n### Status: PASS / FAIL / WARN\n### Findings\n### Recommendation"}
            ],
            "max_tokens": 1500
          }
          REQEOF

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @/tmp/request.json)

          REVIEW=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('choices',[{}])[0].get('message',{}).get('content','Review failed'))" 2>/dev/null || echo "API call failed: $RESPONSE")

          echo "$REVIEW" | tee /tmp/review.md

      - name: Comment on issue
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            const message = context.payload.head_commit ? context.payload.head_commit.message : '';
            const match = message.match(/#(\d+)/);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(match[1]),
                body: `## 🤖 QA Auto-Review (Inside)\n\nCommit: \`${context.sha.slice(0,7)}\`\n\n${review}`
              });
            }

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: review
            });
